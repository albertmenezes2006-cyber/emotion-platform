<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Presente — Emotion Intelligence Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:#0f0f1a;color:#fff;min-height:100vh}
.hero{background:linear-gradient(135deg,#f7971e,#ffd200);padding:50px 20px;text-align:center;color:#000}
.hero h1{font-size:2rem;margin-bottom:10px}
.container{max-width:600px;margin:0 auto;padding:40px 20px}
.card{background:#1a1a2e;border-radius:20px;padding:35px;border:2px solid #ffd200;margin-bottom:20px}
.opcoes{display:grid;gap:15px;margin:20px 0}
.opcao{background:#111;border-radius:12px;padding:20px;cursor:pointer;border:2px solid #333;transition:.3s;display:flex;justify-content:space-between;align-items:center}
.opcao:hover,.opcao.ativo{border-color:#ffd200}
.opcao h3{margin-bottom:5px}
.opcao .preco{font-size:1.3rem;font-weight:700;color:#ffd200}
.form-group{margin:15px 0}
.form-group label{display:block;margin-bottom:8px;color:#aaa}
.form-group input,.form-group textarea{width:100%;padding:12px;background:#111;border:1px solid #333;border-radius:8px;color:#fff;font-size:1rem}
.form-group textarea{height:80px;resize:none}
.btn{width:100%;padding:16px;background:linear-gradient(135deg,#f7971e,#ffd200);color:#000;border:none;border-radius:12px;font-size:1.1rem;font-weight:700;cursor:pointer;margin-top:20px;transition:.3s}
.btn:hover{transform:translateY(-2px)}
.loader{display:none;padding:20px;text-align:center;color:#ffd200}
</style>
</head>
<body>
<div class="hero">
  <h1>🎁 Presente para alguém especial</h1>
  <p>Dê o presente de bem-estar emocional</p>
</div>
<div class="container">
  <div class="card">
    <h2 style="margin-bottom:20px">Escolha o presente:</h2>
    <div class="opcoes">
      {% for op in opcoes %}
      <div class="opcao {% if loop.first %}ativo{% endif %}" onclick="selecionarOpcao('{{op.plano}}',this)">
        <div>
          <h3>{{op.nome}}</h3>
          <div style="color:#aaa;font-size:.85rem">Acesso completo</div>
        </div>
        <div class="preco">R${{op.preco}}</div>
      </div>
      {% endfor %}
    </div>
    <div class="form-group">
      <label>Email do destinatário (opcional):</label>
      <input type="email" id="email_dest" placeholder="amigo@email.com">
    </div>
    <div class="form-group">
      <label>Mensagem personalizada (opcional):</label>
      <textarea id="mensagem" placeholder="Escreva uma mensagem carinhosa..."></textarea>
    </div>
    <button class="btn" onclick="comprar()">🎁 ENVIAR PRESENTE</button>
    <div class="loader" id="loader">⏳ Processando presente...</div>
    <p style="color:#888;font-size:.8rem;text-align:center;margin-top:15px">🔒 Código único gerado automaticamente • Válido por 90 dias</p>
  </div>
</div>
<script>
let planoSelecionado='premium';
function selecionarOpcao(plano,el){
  planoSelecionado=plano;
  document.querySelectorAll('.opcao').forEach(e=>e.classList.remove('ativo'));
  el.classList.add('ativo');
}
async function comprar(){
  document.querySelector('.btn').style.display='none';
  document.getElementById('loader').style.display='block';
  const r=await fetch('/presente/processar',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({plano:planoSelecionado,email_destinatario:document.getElementById('email_dest').value,mensagem:document.getElementById('mensagem').value})
  });
  const d=await r.json();
  if(d.ok) window.location.href=d.url;
  else { alert('Erro: '+d.erro); document.querySelector('.btn').style.display='block'; document.getElementById('loader').style.display='none'; }
}
</script>
</body>
</html>
