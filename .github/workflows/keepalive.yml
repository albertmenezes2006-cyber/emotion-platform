name: Keep Render Alive
on:
  schedule:
    - cron: '*/14 * * * *'  # A cada 14 minutos
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render
        run: |
          echo "Acordando Render..."
          curl -s --max-time 60 https://emotion-platform-albert.onrender.com/health
          echo ""
          echo "✅ Ping enviado"
