services:
  - type: web
    name: emotion-platform-albert
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --loop uvloop --http httptools --timeout-keep-alive 30
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MALLOC_TRIM_THRESHOLD_
        value: "100000"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      - key: PYTHONOPTIMIZE
        value: "1"
    healthCheckPath: /health
    autoDeploy: true
