<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página não encontrada — Emotion Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.container{padding:40px 20px}
.emoji{font-size:100px;margin-bottom:20px;animation:float 3s ease infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
h1{font-size:120px;font-weight:bold;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1}
h2{font-size:32px;margin:20px 0 10px}
p{font-size:18px;color:rgba(255,255,255,0.6);margin-bottom:40px}
.btns{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.btn{padding:15px 40px;border-radius:15px;background:linear-gradient(90deg,#00d2ff,#3a7bd5);color:#fff;text-decoration:none;font-size:18px;font-weight:bold}
.btn-sec{padding:15px 40px;border-radius:15px;border:2px solid rgba(255,255,255,0.3);color:#fff;text-decoration:none;font-size:18px}
</style>
</head>
<body>
<div class="container">
<div class="emoji">😕</div>
<h1>404</h1>
<h2>Página não encontrada</h2>
<p>Ops! A página que você procura não existe ou foi movida.</p>
<div class="btns">
<a href="/" class="btn">🏠 Ir para o Início</a>
<a href="/cadastro" class="btn-sec">🚀 Criar Conta</a>
</div>
</div>
</body>
</html>
