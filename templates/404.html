<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página não encontrada — EmotionAI</title>
    <style>
        :root {
            --primary: #667eea;
            --primary-dark: #764ba2;
            --bg: #f8fafc;
            --text: #1a202c;
            --gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .container {
            max-width: 500px;
            padding: 2rem;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            background: var(--gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 1rem;
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        p { color: #4a5568; margin-bottom: 2rem; line-height: 1.6; }
        .btn {
            background: var(--gradient);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            transition: transform 0.2s;
            display: inline-block;
        }
        .btn:hover { transform: translateY(-2px); }
        .brain-icon { font-size: 4rem; margin-bottom: 1rem; display: block; }
    </style>
</head>
<body>
    <div class="container">
        <span class="brain-icon">🧠</span>
        <div class="error-code">404</div>
        <h1>Opa! Você se perdeu no caminho?</h1>
        <p>A página que você está procurando não existe ou foi movida. Mas não se preocupe, nossa IA Sofia está pronta para te ajudar no painel principal.</p>
        <a href="/" class="btn">Voltar para o Início</a>
    </div>
</body>
</html>
