<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion Intelligence Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh}
.navbar{background:rgba(0,0,0,0.3);padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
.navbar h1{font-size:24px;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-right{display:flex;align-items:center;gap:15px}
.user{color:rgba(255,255,255,0.6);font-size:14px}
.version{background:#3a7bd5;padding:5px 15px;border-radius:20px;font-size:12px}
.logout{background:#e74c3c;padding:8px 20px;border-radius:20px;color:#fff;text-decoration:none;font-size:13px}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
.analyze-section{background:rgba(255,255,255,0.05);border-radius:20px;padding:40px;margin-bottom:30px;border:1px solid rgba(255,255,255,0.1)}
.analyze-section h2{margin-bottom:20px;font-size:28px}
.input-group{display:flex;gap:15px;margin-bottom:20px}
.input-group input{flex:1;padding:18px 25px;border-radius:15px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:18px;outline:none}
.input-group input:focus{border-color:#3a7bd5}
.input-group input::placeholder{color:rgba(255,255,255,0.4)}
.btn{padding:18px 40px;border-radius:15px;border:none;background:linear-gradient(90deg,#00d2ff,#3a7bd5);color:#fff;font-size:18px;font-weight:bold;cursor:pointer}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(58,123,213,0.4)}
.result-card{background:rgba(255,255,255,0.08);border-radius:20px;padding:30px;margin-top:20px;display:none;border:1px solid rgba(255,255,255,0.1)}
.result-card.show{display:block}
.emotion-display{text-align:center;padding:30px}
.emotion-emoji{font-size:80px}
.emotion-name{font-size:36px;font-weight:bold;margin:15px 0;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.emotion-recommendation{font-size:18px;color:rgba(255,255,255,0.7);margin-top:10px;padding:15px;background:rgba(255,255,255,0.05);border-radius:10px}
.dashboard-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(350px,1fr));gap:20px;margin-top:30px}
.card{background:rgba(255,255,255,0.05);border-radius:20px;padding:30px;border:1px solid rgba(255,255,255,0.1)}
.card h3{margin-bottom:20px;font-size:20px;color:#00d2ff}
.history-item{display:flex;justify-content:space-between;align-items:center;padding:12px 15px;margin:8px 0;background:rgba(255,255,255,0.05);border-radius:10px}
.history-text{flex:1;font-size:14px;color:rgba(255,255,255,0.8)}
.history-emotion{padding:5px 15px;border-radius:20px;font-size:12px;font-weight:bold}
.stat-number{font-size:48px;font-weight:bold;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-bar{display:flex;align-items:center;margin:10px 0;gap:10px}
.stat-bar-label{width:100px;font-size:14px}
.stat-bar-fill{height:25px;border-radius:12px;background:linear-gradient(90deg,#00d2ff,#3a7bd5);min-width:5px}
.stat-bar-count{font-size:14px;color:rgba(255,255,255,0.6)}
.footer{text-align:center;padding:40px;color:rgba(255,255,255,0.3);font-size:14px}
.emotion-alegria{background:rgba(46,204,113,0.3);color:#2ecc71}
.emotion-tristeza{background:rgba(52,152,219,0.3);color:#3498db}
.emotion-raiva{background:rgba(231,76,60,0.3);color:#e74c3c}
.emotion-medo{background:rgba(155,89,182,0.3);color:#9b59b6}
.emotion-surpresa{background:rgba(241,196,15,0.3);color:#f1c40f}
.emotion-nojo{background:rgba(39,174,96,0.3);color:#27ae60}
.emotion-amor{background:rgba(255,107,129,0.3);color:#ff6b81}
.emotion-neutro{background:rgba(149,165,166,0.3);color:#95a5a6}
</style>
</head>
<body>
<nav class="navbar">
<h1>🧠 Emotion Intelligence Platform</h1>
<div class="nav-right">
<span class="user">Ola, {{ usuario.nome }}!</span>
<span class="version">v4.0 PRO</span>
<a href="/logout" class="logout">Sair</a>
</div>
</nav>
<div class="container">
<div class="analyze-section">
<h2>🔍 Analisar Emocao</h2>
<div class="input-group">
<input type="text" id="textInput" placeholder="Digite uma frase para analisar...">
<button class="btn" id="btnAnalisar">Analisar</button>
</div>
<div class="result-card" id="resultCard">
<div class="emotion-display">
<div class="emotion-emoji" id="resultEmoji"></div>
<div class="emotion-name" id="resultEmotion"></div>
<div class="emotion-recommendation" id="resultRec"></div>
<p style="margin-top:15px;color:rgba(255,255,255,0.4);font-size:13px" id="resultTime"></p>
</div>
</div>
</div>
<div class="dashboard-grid">
<div class="card">
<h3>📊 Estatisticas</h3>
<div class="stat-number" id="totalAnalyses">0</div>
<p style="color:rgba(255,255,255,0.5)">analises realizadas</p>
<div id="statBars" style="margin-top:20px"></div>
</div>
<div class="card">
<h3>📜 Historico</h3>
<div id="historyList">
<p style="color:rgba(255,255,255,0.4)">Nenhuma analise ainda</p>
</div>
</div>
</div>
</div>
<div class="footer">
<p>Emotion Intelligence Platform 2026</p>
</div>
<script>
document.getElementById('btnAnalisar').addEventListener('click', analyzeText);
document.getElementById('textInput').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') analyzeText();
});

function analyzeText() {
    var text = document.getElementById('textInput').value;
    if (!text) return;
    fetch('/analyze?text=' + encodeURIComponent(text))
    .then(function(response) { return response.json(); })
    .then(function(data) {
        document.getElementById('resultEmoji').textContent = data.emoji;
        document.getElementById('resultEmotion').textContent = data.emocao;
        document.getElementById('resultRec').textContent = data.recomendacao;
        document.getElementById('resultTime').textContent = data.timestamp;
        document.getElementById('resultCard').classList.add('show');
        document.getElementById('textInput').value = '';
        loadStats();
        loadHistory();
    })
    .catch(function() { alert('Erro ao analisar'); });
}

function loadStats() {
    fetch('/stats')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.total_analises) {
            document.getElementById('totalAnalyses').textContent = data.total_analises;
            var barsHTML = '';
            var values = Object.values(data.emocoes_detectadas);
            var max = Math.max.apply(null, values);
            for (var emocao in data.emocoes_detectadas) {
                var count = data.emocoes_detectadas[emocao];
                var width = (count / max) * 100;
                barsHTML += '<div class="stat-bar"><span class="stat-bar-label">' + emocao + '</span><div style="flex:1;background:rgba(255,255,255,0.05);border-radius:12px"><div class="stat-bar-fill" style="width:' + width + '%"></div></div><span class="stat-bar-count">' + count + '</span></div>';
            }
            document.getElementById('statBars').innerHTML = barsHTML;
        }
    }).catch(function() {});
}

function loadHistory() {
    fetch('/historico')
    .then(function(r) { return r.json(); })
    .then(function(data) {
        if (data.total > 0) {
            var html = '';
            var items = data.analises.slice().reverse().slice(0, 10);
            for (var i = 0; i < items.length; i++) {
                var item = items[i];
                var cls = 'emotion-' + item.emocao.toLowerCase();
                html += '<div class="history-item"><span class="history-text">' + item.texto + '</span><span class="history-emotion ' + cls + '">' + item.emoji + ' ' + item.emocao + '</span></div>';
            }
            document.getElementById('historyList').innerHTML = html;
        }
    }).catch(function() {});
}

loadStats();
loadHistory();
</script>
</body>
</html>
