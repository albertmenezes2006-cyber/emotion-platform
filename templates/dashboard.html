<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emotion Intelligence Platform</title>
<link rel="manifest" href="/static/manifest.json">
<meta name="theme-color" content="#3a7bd5">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);color:#fff;min-height:100vh}
.navbar{background:rgba(0,0,0,0.3);padding:20px 40px;display:flex;justify-content:space-between;align-items:center}
.navbar h1{font-size:24px;background:linear-gradient(90deg,#00d2ff,#3a7bd5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.container{max-width:1200px;margin:0 auto;padding:40px 20px}
.analyze-section{background:rgba(255,255,255,0.05);border-radius:20px;padding:40px;margin-bottom:30px}
.input-group{display:flex;gap:10px;margin-bottom:20px}
.input-group input{flex:1;padding:18px;border-radius:15px;border:none;background:rgba(255,255,255,0.1);color:#fff;font-size:18px}
.btn{padding:18px 30px;border-radius:15px;border:none;background:linear-gradient(90deg,#00d2ff,#3a7bd5);color:#fff;font-weight:bold;cursor:pointer}
.mic-btn{background:#e67e22}
.result-card{display:none;margin-top:20px}
.result-card.show{display:block}
.emotion-emoji{font-size:80px;text-align:center}
.emotion-name{text-align:center;font-size:36px;font-weight:bold;margin:10px 0}
.footer{text-align:center;margin-top:40px;color:rgba(255,255,255,0.4)}
</style>
</head>
<body>

<nav class="navbar">
<h1>🧠 Emotion Intelligence Platform</h1>
</nav>

<div class="container">

<div class="analyze-section">
<h2>🔍 Analisar Emoção</h2>

<div class="input-group">
<input type="text" id="textInput" placeholder="Digite ou fale uma frase...">
<button class="btn" onclick="analyzeText()">Analisar</button>
<button class="btn mic-btn" onclick="startVoice()">🎤</button>
</div>

<div class="result-card" id="resultCard">
<div class="emotion-emoji" id="resultEmoji"></div>
<div class="emotion-name" id="resultEmotion"></div>
<p id="resultRec" style="text-align:center"></p>
</div>

</div>

<div class="footer">
Emotion Intelligence Platform 🚀
</div>

<script>
function analyzeText(){
    var text=document.getElementById('textInput').value;
    if(!text)return;
    fetch('/analyze?text='+encodeURIComponent(text))
    .then(r=>r.json())
    .then(data=>{
        document.getElementById('resultEmoji').textContent=data.emoji;
        document.getElementById('resultEmotion').textContent=data.emocao;
        document.getElementById('resultRec').textContent=data.recomendacao;
        document.getElementById('resultCard').classList.add('show');
    });
}

function startVoice(){
    if(!('webkitSpeechRecognition' in window)){
        alert("Seu navegador não suporta reconhecimento de voz.");
        return;
    }

    var recognition=new webkitSpeechRecognition();
    recognition.lang="pt-BR";
    recognition.start();

    recognition.onresult=function(event){
        var transcript=event.results[0][0].transcript;
        document.getElementById('textInput').value=transcript;
        analyzeText();
    };
}
</script>

</body>
</html>
