<title>Recuperar Senha — Emotion Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#00d2ff;--secondary:#3a7bd5;--dark:#0f0c29;--card:rgba(255,255,255,0.05);--border:rgba(255,255,255,0.1)}
body{font-family:'Segoe UI',sans-serif;background:var(--dark);color:#fff;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.box{background:var(--card);border:1px solid var(--border);border-radius:24px;padding:40px;max-width:420px;width:100%;text-align:center}
.logo{font-size:20px;font-weight:bold;background:linear-gradient(90deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:24px;display:block}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:24px;font-weight:700;margin-bottom:8px}
p{color:rgba(255,255,255,0.5);font-size:14px;margin-bottom:24px;line-height:1.6}
.form-group{margin-bottom:16px;text-align:left}
label{display:block;margin-bottom:6px;color:rgba(255,255,255,0.6);font-size:13px}
input{width:100%;padding:13px 16px;border-radius:12px;border:1px solid var(--border);background:rgba(255,255,255,0.05);color:#fff;font-size:14px;outline:none;transition:border .2s}
input:focus{border-color:var(--primary)}
.btn{width:100%;padding:14px;background:linear-gradient(90deg,var(--primary),var(--secondary));border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,210,255,0.3)}
.alert-erro{background:rgba(231,76,60,0.15);border:1px solid rgba(231,76,60,0.3);border-radius:10px;padding:12px;color:#e74c3c;font-size:13px;margin-bottom:16px}
.alert-sucesso{background:rgba(46,204,113,0.15);border:1px solid rgba(46,204,113,0.3);border-radius:10px;padding:12px;color:#2ecc71;font-size:13px;margin-bottom:16px}
.links{margin-top:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.links a{color:rgba(255,255,255,0.4);font-size:13px;text-decoration:none}
.links a:hover{color:var(--primary)}
</style>
  <!-- WCAG 2.1 AA keyboard support -->

      }
    });
  </script>

<body>
<div class="box">
  <a href="/" class="logo">🧠 Emotion Intelligence</a>
  <div class="icon">🔑</div>
  <h1>Recuperar Senha</h1>
  <p>Digite seu email e enviaremos um link para criar uma nova senha.</p>
  {% if erro %}
  <div class="alert-erro">❌ {{erro}}</div>
  {% endif %}
  {% if sucesso %}
  <div class="alert-sucesso">✅ {{sucesso}}</div>
  {% else %}
  <form method="post" action="/recuperar-senha">
    <div class="form-group">
      <label>Email cadastrado</label>
      <input type="email" name="email" placeholder="seu@email.com" required autofocus>
    </div>
    <button type="submit" class="btn">📧 Enviar Link de Recuperação</button>
  </form>
  {% endif %}
  <div class="links">
    <a href="/login">← Voltar ao login</a>
    <a href="/cadastro">Criar conta</a>
    <a href="/contato">Suporte</a>
  </div>
</div>
</body>
