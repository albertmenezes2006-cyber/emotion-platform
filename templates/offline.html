<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline — Emotion Platform</title>
    <style>
        body { font-family: sans-serif; background: linear-gradient(135deg, #667eea, #764ba2);
               min-height: 100vh; display: flex; align-items: center;
               justify-content: center; margin: 0; color: white; text-align: center; padding: 20px; }
        h1 { font-size: 48px; margin-bottom: 8px; }
        p { opacity: 0.9; font-size: 18px; }
        button { background: white; color: #667eea; border: none; padding: 14px 28px;
                 border-radius: 12px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
<a href="#main-content" class="skip-link" style="position:absolute;top:-40px;left:0;background:#667eea;color:white;padding:8px;z-index:9999;text-decoration:none" onfocus="this.style.top='0'">Pular para conteudo</a>
    <div>
        <h1>📵</h1>
        <h2>Você está offline</h2>
        <p>Verifique sua conexão e tente novamente</p>
        <button onclick="window.location.reload()">🔄 Tentar novamente</button>
    </div>
</body>
</html>
