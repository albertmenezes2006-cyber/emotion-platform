<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- Google Analytics -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-JGLER9XVGY"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());
  gtag('config', 'G-JGLER9XVGY');
</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — Emotion Intelligence</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--primary:#00d2ff;--secondary:#3a7bd5;--success:#2ecc71;--danger:#e74c3c}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;align-items:center;justify-content:center;color:#fff;padding:20px}
.card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:48px 40px;width:100%;max-width:420px;backdrop-filter:blur(10px);animation:fadeIn .5s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.logo{text-align:center;font-size:48px;margin-bottom:10px}
h1{text-align:center;font-size:22px;margin-bottom:4px;background:linear-gradient(90deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;font-weight:800}
.sub{text-align:center;color:rgba(255,255,255,0.4);margin-bottom:28px;font-size:13px}
.erro{background:rgba(231,76,60,.15);border:1px solid var(--danger);color:var(--danger);padding:12px 16px;border-radius:12px;margin-bottom:18px;text-align:center;font-size:13px}
.form-group{margin-bottom:18px}
label{display:block;margin-bottom:6px;color:rgba(255,255,255,0.55);font-size:13px;font-weight:600}
input{width:100%;padding:14px 18px;border-radius:12px;border:2px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);color:#fff;font-size:15px;outline:none;transition:all .3s;font-family:inherit}
input:focus{border-color:var(--secondary);box-shadow:0 0 15px rgba(58,123,213,0.2)}
input::placeholder{color:rgba(255,255,255,0.25)}
.btn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(90deg,var(--primary),var(--secondary));color:#fff;font-size:16px;font-weight:bold;cursor:pointer;transition:all .3s;margin-top:4px}
.btn:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(58,123,213,0.4)}
.btn:active{transform:translateY(0)}
.divider{text-align:center;color:rgba(255,255,255,0.2);margin:20px 0;font-size:13px;position:relative}
.divider::before,.divider::after{content:'';position:absolute;top:50%;width:40%;height:1px;background:rgba(255,255,255,0.1)}
.divider::before{left:0}.divider::after{right:0}
.link{text-align:center;margin-top:18px;color:rgba(255,255,255,0.45);font-size:13px}
.link a{color:var(--primary);text-decoration:none;font-weight:600}
.link a:hover{text-decoration:underline}
.links-extra{display:flex;justify-content:center;gap:20px;margin-top:14px}
.links-extra a{color:rgba(255,255,255,0.3);text-decoration:none;font-size:12px;transition:color .2s}
.links-extra a:hover{color:var(--primary)}
.beneficios{background:rgba(0,210,255,0.05);border:1px solid rgba(0,210,255,0.15);border-radius:14px;padding:14px 16px;margin-bottom:22px}
.beneficios p{font-size:12px;color:rgba(255,255,255,0.55);margin-bottom:4px;display:flex;align-items:center;gap:6px}
.beneficios p:last-child{margin-bottom:0}
.loading{display:none}
.btn.carregando .loading{display:inline}
.btn.carregando .txt{display:none}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🧠</div>
  <h1>Emotion Intelligence</h1>
  <p class="sub">Faça login para continuar</p>

  <div class="beneficios">
    <p>🧠 Análise emocional com IA avançada</p>
    <p>💬 Converse com a Sofia, sua psicóloga virtual</p>
    <p>📔 Diário emocional + gráficos</p>
    <p>🏆 Pontos, badges e ranking</p>
  </div>

  {% if erro %}
  <div class="erro">❌ {{ erro }}</div>
  {% endif %}

  <form method="post" action="/login" onsubmit="carregarBtn()">
    <div class="form-group">
      <label>📧 Email</label>
      <input type="email" name="email" placeholder="seu@email.com" required autocomplete="email">
    </div>
    <div class="form-group">
      <label>🔒 Senha</label>
      <input type="password" name="senha" placeholder="••••••••" required autocomplete="current-password">
    </div>
    <button type="submit" class="btn" id="btnLogin">
      <span class="txt">Entrar →</span>
      <span class="loading">⏳ Entrando...</span>
    </button>
  </form>

  <div class="divider">ou</div>

  <div class="link">
    Não tem conta? <a href="/cadastro">Cadastre-se grátis ✨</a>
  </div>

  <div class="links-extra">
    <a href="/faq">❓ Ajuda</a>
    <a href="/contato">📧 Contato</a>
    <a href="/">🏠 Início</a>
  </div>
</div>

<script>
function carregarBtn(){
  var btn=document.getElementById('btnLogin');
  btn.classList.add('carregando');
  btn.disabled=true;
}
</script>
</body>
</html>
